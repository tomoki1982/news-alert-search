name: Collect RSS

on:
  schedule:
    # 例: 毎日 0:20 / 8:20 / 14:20 / 23:20 (UTC) ＝ JSTだと +9時間
    - cron: "20 0,8,14,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-rss
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil "httpx[http2]"

      - name: Run collector
        run: |
          python scripts/collect.py

      - name: Commit & push (if changed)
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: collect rss"
          git push
